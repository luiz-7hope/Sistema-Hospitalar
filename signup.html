<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Cadastro</title>3
    <style>
        :root {
            --color-primary: #00ff41;
            --color-secondary: #ff006e;
            --color-tertiary: #00d9ff;
            --color-accent: #b537f2;
            --color-bg-dark: #0a0e27;
            --color-bg-darker: #050812;
            --color-bg-light: #1a1f3a;
            --color-text-primary: #e0e0e0;
            --color-text-secondary: #a0a0a0;
            --color-border: #00ff4130;
            --glow: 0 0 10px rgba(0, 255, 65, 0.5);
            --glow-secondary: 0 0 15px rgba(255, 0, 110, 0.4);
            --glow-tertiary: 0 0 15px rgba(0, 217, 255, 0.4);
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #050812 50%, #1a1f3a 100%);
            color: var(--color-text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            perspective: 1000px;
        }

        .signup-box {
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.95) 0%, rgba(181, 55, 242, 0.1) 100%);
            border: 2px solid var(--color-primary);
            border-radius: 10px;
            padding: 40px;
            box-shadow: var(--glow), var(--shadow);
            animation: boxSlideIn 0.6s ease;
        }

        @keyframes boxSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--color-tertiary);
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .logo-section h1 {
            font-size: 28px;
            color: var(--color-primary);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .logo-section p {
            color: var(--color-tertiary);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-tertiary);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid var(--color-border);
            color: var(--color-primary);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(10, 14, 39, 0.95);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        input::placeholder {
            color: var(--color-text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .btn-signup {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--color-primary) 0%, #00cc33 100%);
            color: var(--color-bg-dark);
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .btn-signup:hover {
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.8);
            transform: translateY(-2px);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
        }

        .form-footer p {
            color: var(--color-text-secondary);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .form-footer a {
            color: var(--color-secondary);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .form-footer a:hover {
            color: var(--color-primary);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.95) 0%, rgba(181, 55, 242, 0.1) 100%);
            color: var(--color-primary);
            padding: 15px 25px;
            border: 2px solid var(--color-primary);
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transition: all 0.3s ease;
            z-index: 1001;
            letter-spacing: 0.5px;
        }

        .toast.show {
            bottom: 30px;
        }

        .toast-error {
            border-color: #ff1744;
            color: #ff1744;
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.5);
        }

        .toast-success {
            border-color: var(--color-primary);
            color: var(--color-primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .requirements {
            background: rgba(0, 217, 255, 0.1);
            border-left: 3px solid var(--color-tertiary);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 11px;
            color: var(--color-tertiary);
        }

        .requirements p {
            margin: 5px 0;
        }

        .requirements strong {
            color: var(--color-primary);
        }

        @media (max-width: 480px) {
            .signup-box {
                padding: 25px;
            }

            .logo-section h1 {
                font-size: 22px;
            }

            .logo-icon {
                font-size: 36px;
            }

            .signup-container {
                padding: 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 39, 0.8);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-tertiary) 100%);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <div class="logo-section">
                <span class="logo-icon">⚕️</span>
                <h1>MediCare</h1>
                <p>Criar Nova Conta</p>
            </div>

            <div class="requirements">
                <p><strong>Requisitos:</strong></p>
                <p>✓ Email válido</p>
                <p>✓ Senha mínimo 6 caracteres</p>
            </div>

            <form id="signupForm" onsubmit="realizarCadastro(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" placeholder="Nome completo" required>
                    </div>
                    <div class="form-group">
                        <label for="cargo">Cargo:</label>
                        <select id="cargo" required>
                            <option value="">Selecione...</option>
                            <option value="Médico">Médico</option>
                            <option value="Enfermeiro">Enfermeiro</option>
                            <option value="Farmacêutico">Farmacêutico</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Recepcionista">Recepcionista</option>
                            <option value="Técnico">Técnico</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senhaSignup">Senha:</label>
                    <input type="password" id="senhaSignup" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="hospital">Hospital/Clínica:</label>
                    <input type="text" id="hospital" placeholder="Nome do estabelecimento" required>
                </div>

                <button type="submit" class="btn-signup">📝 Criar Conta</button>
            </form>

            <div class="form-footer">
                <p>Já tem uma conta?</p>
                <a href="login.html">Fazer Login Agora</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Verificar se já está logado
        window.addEventListener('load', () => {
            const usuarioLogado = localStorage.getItem('usuarioLogado');
            if (usuarioLogado) {
                window.location.href = 'index.html';
            }
        });

        function realizarCadastro(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const cargo = document.getElementById('cargo').value;
            const senha = document.getElementById('senhaSignup').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            const hospital = document.getElementById('hospital').value;

            // Validações
            if (senha.length < 6) {
                mostrarToast('❌ Senha deve ter no mínimo 6 caracteres!', 'error');
                return;
            }

            if (senha !== confirmarSenha) {
                mostrarToast('❌ As senhas não coincidem!', 'error');
                return;
            }

            // Verificar se email já existe
            const usuariosSalvos = JSON.parse(localStorage.getItem('usuariosMedicare') || '[]');
            if (usuariosSalvos.some(u => u.email === email)) {
                mostrarToast('❌ Este email já está cadastrado!', 'error');
                return;
            }

            // Criar novo usuário
            const novoUsuario = {
                id: Date.now(),
                nome,
                email,
                cargo,
                senha,
                hospital,
                dataCadastro: new Date().toLocaleString('pt-BR')
            };

            usuariosSalvos.push(novoUsuario);
            localStorage.setItem('usuariosMedicare', JSON.stringify(usuariosSalvos));

            mostrarToast('✅ Cadastro realizado com sucesso!', 'success');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }

        function mostrarToast(mensagem, tipo = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = mensagem;
            toast.className = `toast toast-${tipo} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
